name: Release

on:
    workflow_dispatch:
        inputs:
            bump:
                description: 'Bump version by semver keyword.'
                required: true
                type: choice
                options:
                    - patch
                    - minor
                    - major

permissions:
    contents: write

jobs:
    release:
        name: Release
        uses: RustForWeb/.github/.github/workflows/release.yml@b12847e2aa8dede8174ffff5f1ecf932699aeac8 # v1.0.0
        with:
            bump: ${{ inputs.bump }}
            bump-rust: true
            bump-typescript: false
            extract-version: 'rust'
        secrets:
            app-client-id: ${{ secrets.APP_ID }}
            app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
