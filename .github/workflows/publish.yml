name: Publish

on:
    release:
        types: [published]

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        name: Publish
        uses: RustForWeb/.github/.github/workflows/publish.yml@b12847e2aa8dede8174ffff5f1ecf932699aeac8 # v1.0.0
        with:
            enable-rust: true
            enable-typescript: false
